name: Build & Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump minor version from latest release
        id: bump
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST=$(gh release list --limit 1 --json tagName --jq '.[0].tagName // empty')
          if [ -z "$LATEST" ]; then
            NEW_VERSION="1.0.0"
          else
            # Strip leading 'v' if present
            VER="${LATEST#v}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$VER"
            MINOR=$((MINOR + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.0"
          fi
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Bumping: ${LATEST:-none} -> v${NEW_VERSION}"

  build:
    name: Build Windows
    needs: version
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: >
          cmake -B build
          -G "Visual Studio 17 2022"
          -DMFAMP_ASIO=OFF
          -DMFAMP_INSTALL_LOCAL=OFF

      - name: Build Release
        run: cmake --build build --config Release

      - name: Package artifacts
        shell: bash
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          STAGING="MF-AMP-${VERSION}"
          mkdir -p "${STAGING}"
          cp -r "build/MFAmp_artefacts/Release/VST3/MF AMP.vst3" "${STAGING}/"
          cp "build/MFAmp_artefacts/Release/Standalone/MF AMP.exe" "${STAGING}/"
          7z a "MF-AMP-${VERSION}-win64.zip" "${STAGING}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: MF-AMP-win64
          path: MF-AMP-*-win64.zip

  release:
    name: Create Release
    needs: [version, build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: MF-AMP-win64

      - name: Create tag
        run: |
          git tag "${{ needs.version.outputs.tag }}"
          git push origin "${{ needs.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: MF AMP ${{ needs.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: MF-AMP-*-win64.zip
